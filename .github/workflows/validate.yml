name: Validate Scoop Bucket

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: scoop-bucket-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add local bucket and install lore-book
        shell: pwsh
        run: |
          scoop bucket add localbucket $PWD
          scoop install localbucket/lore-book
          lore version
